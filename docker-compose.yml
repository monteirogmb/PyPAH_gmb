services:

  pypah-dev:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    container_name: pypah-dev
    volumes:
      - ./ETL:/app/ETL
      - ./Streamlit:/app/Streamlit
    ports:
      - "8502:8501"
    stdin_open: true
    tty: true

  pypah-api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: pypah-api
    ports:
      - "8000:8000"
    env_file:
      - .env

  pypah-app:
    build:
      context: .
      dockerfile: docker/Dockerfile.user
    container_name: pypah-app
    ports:
      - "8501:8501"
    volumes:
      - ./Streamlit:/app/Streamlit
    env_file:
      - .env
    depends_on:
      - pypah-api

  # ─────────────────────────────────────────────────────────────────────────
  # Pipeline incremental
  # No Render: use como Cron Job com schedule "0 3 10 * *" (todo dia 10, 3h)
  # Localmente: rode com `docker compose run --rm pypah-pipeline`
  #
  # Para carga histórica completa:
  #   docker compose run --rm pypah-pipeline \
  #     python -m Pipeline.pipeline_runner --ano-inicio 2018 --mes-inicio 1
  # ─────────────────────────────────────────────────────────────────────────
  pypah-pipeline:
    build:
      context: .
      dockerfile: docker/Dockerfile.pipeline
    container_name: pypah-pipeline
    env_file:
      - .env
    # Evita que suba automaticamente com `docker compose up`
    profiles:
      - pipeline
